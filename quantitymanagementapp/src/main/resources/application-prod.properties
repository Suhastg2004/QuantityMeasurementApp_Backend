# MySQL Database (Production)
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Stg@2004

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=True

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Logging
logging.level.root=WARN
# FIXED: Updated to point to your actual base package
logging.level.com.seveneleven.quantity_measurement_app=INFO

# Actuator
management.endpoints.web.exposure.include=health,metrics