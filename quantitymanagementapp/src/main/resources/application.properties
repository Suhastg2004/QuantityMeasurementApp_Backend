spring.application.name=quantity-measurement-app
server.port=8080

# =========================
# MySQL Database (PRIMARY)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Stg@2004

# =========================
# JPA Configuration
# =========================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# Connection Pool (Optimized)
# =========================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# =========================
# Logging Configuration
# =========================
logging.level.root=INFO
#logging.level.com.app.quantitymeasurementapp=DEBUG

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Enable request logging
spring.mvc.log-request-details=true
spring.mvc.log-resolved-exception=true

# =========================
# Swagger / OpenAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true

# =========================
# OPTIONAL: H2 (Disabled by default)
# Uncomment only if needed for testing
