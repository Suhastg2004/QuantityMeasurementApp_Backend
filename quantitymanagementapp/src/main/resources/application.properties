spring.application.name=quantity-measurement-app
server.port=8080

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Database (Development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Added DB_CLOSE_DELAY=-1 to keep the in-memory DB alive
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Logging Configuration
logging.level.root=INFO
# FIXED: Updated to point to your actual base package
logging.level.com.seveneleven.quantity_measurement_app=DEBUG

# Enable request details logging
spring.mvc.log-request-details=true
spring.mvc.log-resolved-exception=true

# Logging levels
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc=TRACE
logging.level.org.hibernate.SQL=DEBUG
# FIXED: Updated BasicBinder to the new Hibernate 6 property for Spring Boot 3
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Custom log pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{5}:%line - %msg%n

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true